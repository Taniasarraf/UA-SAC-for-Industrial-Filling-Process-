algorithm: monte_carlo
mode: train
seed: 42

# Digital Twin: Physical Dynamics
physics:
  target_weight: 750.0
  tolerance: 10.0
  dt: 0.01
  quantization: 10.0
  coarse_rate: 600.0
  fine_rate: 60.0
  sigma_proc: 5.0
  sigma_meas: 3.0
  initial_surge_mag: 20.0
  mu_residual: 15.0
  sigma_residual: 2.5
  max_steps: 600

# Monte Carlo Hyperparameters
mc_hyperparameters:
  episodes: 3000
  gamma: 0.99
  initial_q: 0.0
  epsilon_start: 1.0
  epsilon_min: 0.05
  epsilon_decay: 0.998
  
  # Discretization resolution configuration floors
  state_discretization:
    weight_step: 10      
    velocity_step: 5     
    error_step: 10       

# Output Configuration 
logging:
  checkpoint_every: 1
  stats_json: "mc_stats.json"
  output_dir: "Outputs_MC_Baseline"